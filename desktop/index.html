<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ZAHL</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="shell" id="shell">
  <img class="shell-art" src="assets/shell.png" alt="">
  <canvas class="particles" id="particleCanvas" width="170" height="375"></canvas>

  <div class="screen-overlay">
    <canvas id="zahlCanvas" width="64" height="64"></canvas>
    <div class="scanlines"></div>
    <div class="hud">
      <span id="hudMood">HUNGRY</span>
      <span id="hudLevel">LV 1</span>
    </div>
    <div class="submenu" id="submenu"></div>
  </div>

  <!-- invisible hotspots mapped onto the gems already sculpted into the shell art -->
  <div class="hotspot hs-close" id="hsClose">
    <span class="tip tip-right">CLOSE — saves &amp; quits</span>
  </div>
  <div class="hotspot hs-feed" id="hsFeed">
    <span class="tip tip-center">FEED +25 hunger</span>
  </div>
  <div class="hotspot hs-pet" id="hsPet">
    <span class="tip tip-center">PET — calm + entropy</span>
  </div>
  <div class="hotspot hs-ritual" id="hsRitual">
    <span class="tip tip-center">RITUALS: spend souls</span>
  </div>
  <div class="hotspot hs-stats" id="hsStats">
    <span class="tip tip-left">STATS readout</span>
  </div>
  <div class="hotspot hs-toggle" id="hsToggle">
    <span class="tip tip-right">DESKTOP MODE (or Ctrl+Alt+D)</span>
  </div>
</div>

<script src="core/zahl-core.js"></script>
<script src="core/zahl-render.js"></script>
<script src="core/zahl-audio.js"></script>
<script src="renderer.js"></script>
</body>
</html>
