<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ZAHL</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="shell" id="shell">
  <img class="shell-art" src="assets/shell.png" alt="">

  <div class="screen-overlay">
    <canvas id="zahlCanvas" width="64" height="64"></canvas>
    <div class="scanlines"></div>
    <div class="hud">
      <span id="hudMood">HUNGRY</span>
      <span id="hudLevel">LV 1</span>
    </div>
    <div class="submenu" id="submenu"></div>
  </div>

  <!-- invisible hotspots mapped onto the gems already sculpted into the shell art -->
  <div class="hotspot hs-close" id="hsClose" title="close"></div>
  <div class="hotspot hs-feed" id="hsFeed" title="feed"></div>
  <div class="hotspot hs-pet" id="hsPet" title="pet"></div>
  <div class="hotspot hs-ritual" id="hsRitual" title="rituals"></div>
  <div class="hotspot hs-stats" id="hsStats" title="stats"></div>
</div>

<script src="core/zahl-core.js"></script>
<script src="core/zahl-render.js"></script>
<script src="renderer.js"></script>
</body>
</html>
